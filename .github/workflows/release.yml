name: Build Binaries

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r src/requirements.txt && python -m pip install pyinstaller-versionfile

      - name: Update version info
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          $NUMERIC_VERSION = $VERSION -replace '[^0-9.]', ''
          $VERSION_PARTS = ($NUMERIC_VERSION -split '\.') + @('0', '0', '0', '0')
          # Convert to integers to remove leading zeros
          $VERSION_PARTS = $VERSION_PARTS[0..3] | ForEach-Object { [int]($_ -replace '^$', '0') }
          (Get-Content version_info.py) -replace 'filevers=\(0, 3, 0, 0\)', "filevers=($($VERSION_PARTS[0]), $($VERSION_PARTS[1]), $($VERSION_PARTS[2]), $($VERSION_PARTS[3]))" -replace 'prodvers=\(0, 3, 0, 0\)', "prodvers=($($VERSION_PARTS[0]), $($VERSION_PARTS[1]), $($VERSION_PARTS[2]), $($VERSION_PARTS[3]))" -replace "u'FileVersion', u'0.3.0.0'", "u'FileVersion', u'$NUMERIC_VERSION.0'" -replace "u'ProductVersion', u'0.3.0.0'", "u'ProductVersion', u'$NUMERIC_VERSION.0'" | Set-Content version_info.py
        shell: powershell

      - name: Build Windows binary
        run: |
          pyinstaller yahac.spec
          move dist\yahac.exe yahac-${{ github.ref_name }}.exe
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: yahac-${{ github.ref_name }}.exe
          path: yahac-${{ github.ref_name }}.exe

  build-linux:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: apt update && apt-get install build-essential libgtk-3-dev python3-venv python3-pip wget xz-utils libxcb-xinerama0 libxcb-cursor0 libxkbcommon-x11-0 -y

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r src/requirements.txt

      - name: Build Linux binary
        run: |
          pyinstaller yahac.spec
          mv dist/yahac yahac-ubuntu-24-04-${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0

        with:
          name: yahac-ubuntu-24-04-${{ github.ref_name }}
          path: yahac-ubuntu-24-04-${{ github.ref_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: yahac-ubuntu-24-04-${{ github.ref_name }}
          path: .

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: yahac-${{ github.ref_name }}.exe
          path: .

      - name: Generate Release Notes
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMIT_SHAS=$(git log --pretty=format:"%H" --no-merges)
          else
            COMMIT_SHAS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%H" --no-merges)
          fi

          COMMITS=""
          while IFS= read -r SHA; do
            [ -z "$SHA" ] && continue

            SUBJECT=$(git log -n 1 --format=%s "$SHA")
            AUTHOR_LOGIN=$(gh api "repos/${{ github.repository }}/commits/${SHA}" --jq '.author.login // .committer.login // ""' 2>/dev/null || true)

            if [ -z "$AUTHOR_LOGIN" ] || [ "$AUTHOR_LOGIN" = "null" ]; then
              AUTHOR_LOGIN=$(git log -n 1 --format=%an "$SHA" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
            fi

            COMMITS="${COMMITS}* ${SUBJECT} by @${AUTHOR_LOGIN} in ${SHA}\n"
          done <<< "$COMMIT_SHAS"

          # Separate dependabot and regular changes
          DEPENDABOT_CHANGES=$(echo -e "$COMMITS" | grep -i "dependabot" || true)
          OTHER_CHANGES=$(echo -e "$COMMITS" | grep -v -i "dependabot" || true)

          # Build release notes
          RELEASE_NOTES="## What's Changed\n"
          if [ ! -z "$OTHER_CHANGES" ]; then
            RELEASE_NOTES="${RELEASE_NOTES}${OTHER_CHANGES}\n\n"
          fi

          if [ ! -z "$DEPENDABOT_CHANGES" ]; then
            RELEASE_NOTES="${RELEASE_NOTES}## Dependency Updates\n${DEPENDABOT_CHANGES}\n\n"
          fi

          RELEASE_NOTES="${RELEASE_NOTES}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${{ github.ref_name }}"

          # Save to output
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo -e "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
          files: |
            yahac-ubuntu-24-04-${{ github.ref_name }}
            yahac-${{ github.ref_name }}.exe

