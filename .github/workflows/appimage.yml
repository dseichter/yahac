name: Build AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to attach asset to (for manual runs)'
        required: false
        type: string

jobs:
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve release tag
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_RELEASE_TAG" ]; then
            TAG="$INPUT_RELEASE_TAG"
          fi
          if [ -z "$TAG" ] || [[ ! "$TAG" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "A valid tag (e.g. v2026.3.1) is required." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 patchelf desktop-file-utils
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt

      - name: Build Linux binary
        run: |
          pyinstaller --onefile src/yahac.py -n yahac --icon=icons/yahac.ico

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          install -Dm755 dist/yahac AppDir/usr/bin/yahac
          install -Dm644 icons/home_app_logo_48dp_1976D2_FILL0_wght400_GRAD0_opsz48.png AppDir/usr/share/icons/hicolor/256x256/apps/yahac.png

          cat > AppDir/usr/share/applications/yahac.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=yahac
          Exec=yahac
          Icon=yahac
          Categories=Utility;Development;
          Terminal=false
          EOF

          install -Dm644 AppDir/usr/share/applications/yahac.desktop AppDir/yahac.desktop
          install -Dm644 AppDir/usr/share/icons/hicolor/256x256/apps/yahac.png AppDir/yahac.png

          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          exec "$APPDIR/usr/bin/yahac" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        env:
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir "yahac-appimage-${RELEASE_TAG}-x86_64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: yahac-appimage-${{ steps.vars.outputs.tag }}-x86_64
          path: yahac-appimage-${{ steps.vars.outputs.tag }}-x86_64.AppImage

      - name: Upload AppImage to Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: yahac-appimage-${{ steps.vars.outputs.tag }}-x86_64.AppImage
